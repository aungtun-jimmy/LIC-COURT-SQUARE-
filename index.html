<!DOCTYPE html>
<html>
<head>
    <title>CSQ VIEWER PORTAL</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
        }

        .btn {
            display: block;
            background-color: #2d89ef;
            color: white;
            padding: 12px;
            margin: 10px auto;
            width: 250px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #1b5fbd;
        }
    </style>

    <script>
        function checkPassword(category, link) {
            var password = prompt("Enter password for " + category + ":");

            if (category === "BRACKET" && password === "csq.ptsint") {
                window.open(link, "_blank");
            }
            else if (category === "PANEL" && password === "csq.ptsint") {
                window.open(link, "_blank");
            }
            else {
                alert("Wrong password!");
            }
        }
    </script>

</head>

<body>

    <h1>"CSQ" LIC COURT SQUARE PROJECT</h1>

    <h2>FLOOR BRACKET</h2>
    <a class="btn" href="#" onclick="checkPassword('BRACKET','BRACKET_L01_LINK')">LEVEL - 01</a>
    <a class="btn" href="#" onclick="checkPassword('BRACKET','BRACKET_L02_LINK')">LEVEL - 02</a>
    <a class="btn" href="#" onclick="checkPassword('BRACKET','BRACKET_L03_LINK')">LEVEL - 03</a>

    <h2>FACADE PANEL</h2>
    <a class="btn" href="#" onclick="checkPassword('PANEL','PANEL_L01_LINK')">LEVEL - 01</a>
    <a class="btn" href="#" onclick="checkPassword('PANEL','PANEL_L02_LINK')">LEVEL - 02</a>
    <a class="btn" href="#" onclick="checkPassword('PANEL','PANEL_L03_LINK')">LEVEL - 03</a>

</body>
</html>
