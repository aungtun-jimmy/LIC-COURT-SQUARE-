<style>
.card {
    background-color: #1e293b;
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
}
.card h2 {
    margin: 0;
    font-size: 20px;
    cursor: pointer;
    text-align: center;
    border-bottom: 1px solid #334155;
    padding-bottom: 10px;
    position: relative;
}
.card h2::after {
    content: "▼"; /* arrow down */
    position: absolute;
    right: 10px;
    font-size: 16px;
    transition: transform 0.3s;
}
.card.open h2::after {
    transform: rotate(180deg); /* arrow up when open */
}
.card-content {
    display: none;
    margin-top: 10px;
}
.card.open .card-content {
    display: block;
}
</style>

<script>
async function loadData() {
    const url = "YOUR_PUBLISHED_SHEET_LINK"; 
    const response = await fetch(url);
    const text = await response.text();

    const rows = text.split("\n").map(r => r.split(","));
    const data = rows.slice(1);

    const categories = {};
    data.forEach(row => {
        if (row.length < 4) return;
        const [category, sub, branch, link] = row;
        if (!category) return;
        if (!categories[category]) categories[category] = [];
        categories[category].push({ sub, branch, link });
    });

    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    for (const category in categories) {
        const card = document.createElement("div");
        card.className = "card";
        card.id = category.toLowerCase().replace(/\s+/g, "-");
        card.innerHTML = `<h2>${category}</h2>`;

        const content = document.createElement("div");
        content.className = "card-content";

        categories[category].forEach(item => {
            const btn = document.createElement("div");
            btn.className = "link-btn";
            let label = "";
            if (item.sub && item.sub !== "–") label += item.sub;
            if (item.branch && item.branch !== "–") {
                label += label ? " – " + item.branch : item.branch;
            }
            btn.textContent = label || "Link";

            if (item.link && item.link.trim() !== "" && !item.link.toLowerCase().includes("paste link here")) {
                btn.onclick = () => window.open(item.link, "_blank");
            } else {
                const msg = document.createElement("div");
                msg.className = "no-link";
                msg.textContent = "No link yet";
                content.appendChild(msg);
                btn.style.backgroundColor = "#475569";
                btn.style.cursor = "not-allowed";
            }

            content.appendChild(btn);
        });

        // Toggle open/close on click
        card.querySelector("h2").onclick = () => {
            card.classList.toggle("open");
        };

        card.appendChild(content);
        container.appendChild(card);
    }
}
loadData();
</script>
