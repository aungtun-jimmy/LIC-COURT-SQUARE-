<!DOCTYPE html>
<html>
<head>
    <title>LIC COURT SQUARE - CSQ Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        /* ===== COVER SECTION ===== */
        .cover {
            height: 400px;
            background: url('cover.png') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.55);
        }

        .project-title {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .project-title h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }

        .project-title p {
            margin-top: 10px;
            font-size: 18px;
        }

        /* ===== LOGO ===== */
        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 3;
        }

        .logo img {
            height: 60px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }

        /* ===== PORTAL SECTION ===== */
        .portal {
            padding: 50px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
        }

        .card h2 {
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        .link-btn {
            display: block;
            background-color: #2563eb;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .link-btn:hover {
            background-color: #1d4ed8;
        }
    </style>

    <script>
        function openLink(link) {
            window.open(link, "_blank");
        }
    </script>

</head>

<body>

<!-- ===== COVER ===== -->
<div class="cover">

    <div class="logo">
        <img src="logo.jpg" alt="Company Logo">
    </div>

    <div class="project-title">
        <h1>LIC COURT SQUARE</h1>
        <p>45-03 23RD STREET, QUEENS, NY</p>
    </div>

</div>

<!-- ===== PORTAL ===== -->
<div class="portal">

    <div class="container">

        <!-- FLOOR BRACKET -->
        <div class="card">
            <h2>FLOOR BRACKET</h2>
            <div class="link-btn" onclick="openLink('PUT_LEVEL01_LINK')">LEVEL 01</div>
            <div class="link-btn" onclick="openLink('PUT_LEVEL02_LINK')">LEVEL 02</div>
            <div class="link-btn" onclick="openLink('PUT_LEVEL03_LINK')">LEVEL 03</div>
        </div>

        <!-- FABRICATIONS PROGRESS -->
        <div class="card">
            <h2>FABRICATIONS PROGRESS</h2>
            <div class="link-btn" onclick="openLink('PUT_FAB_LEVEL01_LINK')">LEVEL 01</div>
            <div class="link-btn" onclick="openLink('PUT_FAB_LEVEL02_LINK')">LEVEL 02</div>
            <div class="link-btn" onclick="openLink('PUT_FAB_LEVEL03_LINK')">LEVEL 03</div>
        </div>

    </div>

</div>

</body>
</html>
