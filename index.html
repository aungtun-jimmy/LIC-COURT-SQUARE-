<!DOCTYPE html>
<html>
<head>
    <title>CSQ - LIC COURT SQUARE PROJECT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        /* COVER IMAGE */
        .cover {
            height: 300px;
            background: url('cover.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            background-blend-mode: overlay;
            background-color: rgba(0,0,0,0.6);
        }

        .cover h1 {
            font-size: 36px;
            letter-spacing: 2px;
        }

        /* LOGIN BOX */
        .login-box {
            text-align: center;
            margin: 40px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .portal {
            display: none;
            padding: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .card {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 12px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .link-btn {
            display: block;
            background-color: #2563eb;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
        }

        .link-btn:hover {
            background-color: #1d4ed8;
        }
    </style>

    <script>
        function login() {
            var password = document.getElementById("password").value;

            if (password === "csq.pts.int") {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("portalSection").style.display = "block";
            } else {
                alert("Wrong Password");
            }
        }

        function openLink(link) {
            window.open(link, "_blank");
        }
    </script>

</head>

<body>

<!-- COVER IMAGE -->
<div class="cover">
    <h1>CSQ - LIC COURT SQUARE PROJECT</h1>
</div>

<!-- LOGIN SECTION -->
<div id="loginSection" class="login-box">
    <h2>Secure Project Access</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <br><br>
    <button onclick="login()">Enter</button>
</div>

<!-- PORTAL SECTION -->
<div id="portalSection" class="portal">

    <div class="container">

        <!-- FLOOR BRACKET -->
        <div class="card">
            <h2>FLOOR BRACKET</h2>
            <div class="link-btn" onclick="openLink('PUT_LEVEL01_LINK')">LEVEL 01</div>
            <div class="link-btn" onclick="openLink('PUT_LEVEL02_LINK')">LEVEL 02</div>
            <div class="link-btn" onclick="openLink('PUT_LEVEL03_LINK')">LEVEL 03</div>
        </div>

        <!-- FACADE -->
        <div class="card">
            <h2>FACADE</h2>
            <div class="link-btn" onclick="openLink('PUT_FACADE_LEVEL01_LINK')">LEVEL 01</div>
            <div class="link-btn" onclick="openLink('PUT_FACADE_LEVEL02_LINK')">LEVEL 02</div>
            <div class="link-btn" onclick="openLink('PUT_FACADE_LEVEL03_LINK')">LEVEL 03</div>
        </div>

    </div>

</div>

</body>
</html>
