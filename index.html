<!DOCTYPE html>
<html>
<head>
<title>Peterson International LLC - BIM Dashboard</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0d1b2a;
    color: #fff;
}

/* HEADER */
header {
    background: #14213d;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 1px;
}

/* KPI BAR */
.kpi-bar {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    background: #1b263b;
}
.kpi {
    text-align: center;
}
.kpi h3 {
    margin: 5px 0;
    color: #ffcc00;
}

/* SEARCH */
.search-box {
    text-align: center;
    padding: 20px;
}
.search-box input {
    width: 300px;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

/* CARDS */
.portal {
    padding: 30px;
}
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}
.card {
    background: #1b263b;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card h2 {
    border-bottom: 1px solid #2e3b55;
    padding-bottom: 10px;
    cursor: pointer;
}
.card-content {
    display: none;
    margin-top: 10px;
}
.card.open .card-content {
    display: block;
}

/* LINKS */
.link-row {
    margin: 10px 0;
}
.link-btn {
    display: inline-block;
    padding: 8px 14px;
    background: #2563eb;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}
.status {
    float: right;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
}
.completed { background: #16a34a; }
.progress { background: #eab308; }
.delayed { background: #dc2626; }

@media(max-width:768px){
    .container { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>Peterson International LLC – BIM Dashboard</header>

<div class="kpi-bar">
    <div class="kpi">
        <h3 id="totalCategories">0</h3>
        <div>Categories</div>
    </div>
    <div class="kpi">
        <h3 id="totalLinks">0</h3>
        <div>Total Links</div>
    </div>
    <div class="kpi">
        <h3 id="activeLinks">0</h3>
        <div>Active Links</div>
    </div>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search level, branch..." onkeyup="filterCards()">
</div>

<div class="portal">
    <div class="container" id="cardContainer"></div>
</div>

<script>
async function loadData() {
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv";
const response = await fetch(url);
const text = await response.text();
const rows = text.split("\n").map(r => r.split(","));
const data = rows.slice(1);

const categories = {};
let totalLinks = 0;
let activeLinks = 0;

data.forEach(row => {
    if(row.length < 5) return;
    const [category, sub, branch, link, status] = row.map(c => c.trim());
    if(!category) return;

    if(!categories[category]) categories[category] = [];
    categories[category].push({sub, branch, link, status});
    totalLinks++;
    if(link) activeLinks++;
});

document.getElementById("totalCategories").textContent = Object.keys(categories).length;
document.getElementById("totalLinks").textContent = totalLinks;
document.getElementById("activeLinks").textContent = activeLinks;

const container = document.getElementById("cardContainer");

for(const category in categories){
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`<h2>${category}</h2>`;

    const content=document.createElement("div");
    content.className="card-content";

    categories[category].forEach(item=>{
        const row=document.createElement("div");
        row.className="link-row";

        let statusClass="";
        if(item.status==="Completed") statusClass="completed";
        else if(item.status==="In Progress") statusClass="progress";
        else if(item.status==="Delayed") statusClass="delayed";

        if(item.link){
            row.innerHTML=
            `<a class="link-btn" href="${item.link}" target="_blank">
            ${item.sub} – ${item.branch}
            </a>
            <span class="status ${statusClass}">${item.status}</span>`;
        } else {
            row.innerHTML=
            `<span>${item.sub} – ${item.branch}</span>
            <span class="status ${statusClass}">${item.status}</span>`;
        }
        content.appendChild(row);
    });

    card.querySelector("h2").onclick=()=>card.classList.toggle("open");

    card.appendChild(content);
    container.appendChild(card);
}
}

function filterCards(){
const input=document.getElementById("searchInput").value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(input)?"block":"none";
});
}

loadData();
</script>

</body>
</html>
