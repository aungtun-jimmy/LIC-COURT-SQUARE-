<!DOCTYPE html>
<html>
<head>
  <title>Peterson International LLC - CSQ Portal</title>
  <!-- Link to manifest for PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#006d77">
  <style>
    body {
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background-color: #eceff1;
      color: #2c3e50;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #006d77;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #ffffff;
    }
    .cover {
      height: 220px;
      background: url('cover.png') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .project-title {
      position: relative;
      z-index: 2;
      color: #ffffff;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      padding: 12px 20px;
      border-radius: 6px;
    }
    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 3;
    }
    .logo img {
      height: 60px;
      background: white;
      padding: 5px;
      border-radius: 5px;
    }
    .portal {
      flex: 1;
      padding: 20px;
    }
    .card {
      background-color: #f9f9f9;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
      color: #006d77;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      padding: 12px 16px;
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-shadow: 
        4px 4px 10px rgba(0,0,0,0.35),
        inset -3px -3px 6px rgba(255,255,255,0.8),
        inset 3px 3px 6px rgba(0,0,0,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card h2:hover {
      transform: translateY(-3px);
      box-shadow: 
        6px 6px 14px rgba(0,0,0,0.45),
        inset -3px -3px 6px rgba(255,255,255,0.8),
        inset 3px 3px 6px rgba(0,0,0,0.25);
    }
    .card h2::after {
      content: "▶";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.3s;
    }
    .card.open h2::after {
      transform: translateY(-50%) rotate(90deg);
    }
    .card-content {
      display: none;
      padding: 15px;
    }
    .card.open .card-content {
      display: block;
    }
    .link-btn {
      display: block;
      background-color: #006d77;
      color: #ffffff;
      font-weight: bold;
      padding: 10px;
      margin: 6px 0;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 
        4px 4px 10px rgba(0,0,0,0.35),
        inset -3px -3px 6px rgba(255,255,255,0.5),
        inset 3px 3px 6px rgba(0,0,0,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .link-btn:hover {
      background-color: #004d4f;
      transform: translateY(-3px);
      box-shadow: 
        6px 6px 14px rgba(0,0,0,0.45),
        inset -3px -3px 6px rgba(255,255,255,0.5),
        inset 3px 3px 6px rgba(0,0,0,0.25);
    }
    footer {
      background-color: #006d77;
      text-align: center;
      padding: 14px;
      font-size: 13px;
      color: #ffffff;
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  Peterson International LLC
</header>

<div class="cover">
  <div class="logo">
    <img src="logo.jpg" alt="Company Logo" 
         onerror="this.src='https://via.placeholder.com/150x60?text=Logo';">
  </div>
  <div class="project-title">
    <h1>LIC COURT SQUARE</h1>
    <p>45-03 23RD STREET, QUEENS, NY</p>
  </div>
</div>

<div class="portal">
  <div id="cardContainer"></div>
</div>

<footer>
  © Peterson International LLC – All Rights Reserved
</footer>

<script>
async function loadData() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv"; 
  const response = await fetch(url);
  const text = await response.text();

  const rows = text.split("\n").map(r => r.split(","));
  const data = rows.slice(1);

  const categories = {};
  data.forEach(row => {
    const category = row[0] ? row[0].trim() : "";
    const subCategory = row[1] ? row[1].trim() : "";
    const branchLevel = row[2] ? row[2].trim() : "";
    const linkNotes = row[3] ? row[3].trim() : "";
    if (!category) return;
    if (!categories[category]) categories[category] = [];
    categories[category].push({ subCategory, branchLevel, linkNotes });
  });

  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  for (const category in categories) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h2>${category}</h2>`;
    const content = document.createElement("div");
    content.className = "card-content";

    categories[category].forEach(item => {
      let label = "";
      label += item.subCategory && item.subCategory !== "–" ? item.subCategory : "Sub";
      label += item.branchLevel && item.branchLevel !== "–" ? " – " + item.branchLevel : "";

      if (item.linkNotes && item.linkNotes.trim() !== "" && !item.linkNotes.toLowerCase().includes("paste link here")) {
        const btn = document.createElement("a");
        btn.className = "link-btn";
        btn.textContent = label;
        btn.href = item.linkNotes;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
        content.appendChild(btn);
      } else {
        const btn = document.createElement("div");
        btn.className = "link-btn";
        btn.textContent = label + " (Not Available)";
        btn.style.backgroundColor = "#ccc";
        btn.style.color = "#666";
        content.appendChild(btn);
      }
    });

    card.querySelector("h2").onclick = () => {
      card.classList.toggle("open");
    };

    card.appendChild(content);
    container.appendChild(card);
  }
}
loadData();
</script>

<!-- Register service worker for PWA -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker registered"))
    .catch(err => console.error("Service Worker failed:", err));
}
</script>

</body>
</html>
