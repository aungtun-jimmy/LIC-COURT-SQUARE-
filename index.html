<!DOCTYPE html>
<html>
<head>
    <title>LIC COURT SQUARE - CSQ Portal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        nav {
            background-color: #1e293b;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #2563eb;
        }

        .cover {
            height: 300px;
            background: url('cover.png') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
        }
        .project-title {
            position: relative;
            text-align: center;
            z-index: 2;
        }
        .project-title h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }
        .project-title p {
            margin-top: 10px;
            font-size: 18px;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 3;
        }
        .logo img {
            height: 60px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }

        .portal {
            padding: 50px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* two columns */
            gap: 40px;
        }
        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .card h2 {
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .link-btn {
            display: block;
            background-color: #2563eb;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .link-btn:hover {
            background-color: #1d4ed8;
        }
        .no-link {
            color: #f87171; /* red text for clarity */
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Responsive tweak: one column on small screens */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<nav>
    <a href="#floor">Floor Bracket</a>
    <a href="#progress">Fabrication Progress</a>
    <a href="#bim-cmi">BIM Model - CMI</a>
    <a href="#bim-pts">BIM Model - PTS</a>
</nav>

<div class="cover">
    <div class="logo">
        <img src="logo.jpg" alt="Company Logo">
    </div>
    <div class="project-title">
        <h1>LIC COURT SQUARE</h1>
        <p>45-03 23RD STREET, QUEENS, NY</p>
    </div>
</div>

<div id="portalSection" class="portal">
    <div class="container" id="cardContainer">
        <!-- Cards will be injected here -->
    </div>
</div>

<script>
async function loadData() {
    // Using your published Google Sheet CSV link
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv"; 

    const response = await fetch(url);
    const text = await response.text();

    const rows = text.split("\n").map(r => r.split(","));
    const data = rows.slice(1);

    const categories = {};
    data.forEach(row => {
        const [category, sub, branch, link] = row;
        if (!categories[category]) categories[category] = [];
        categories[category].push({ sub, branch, link });
    });

    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    for (const category in categories) {
        const card = document.createElement("div");
        card.className = "card";
        card.id = category.toLowerCase().replace(/\s+/g, "-");
        card.innerHTML = `<h2>${category}</h2>`;

        categories[category].forEach(item => {
            const btn = document.createElement("div");
            btn.className = "link-btn";
            let label = "";
            if (item.sub && item.sub !== "–") label += item.sub;
            if (item.branch && item.branch !== "–") {
                label += label ? " – " + item.branch : item.branch;
            }
            btn.textContent = label || "Link";

            if (item.link && item.link !== "(paste link here)") {
                btn.onclick = () => window.open(item.link, "_blank");
            } else {
                // Show "No link yet" message
                const msg = document.createElement("div");
                msg.className = "no-link";
                msg.textContent = "No link yet";
                card.appendChild(msg);
                btn.style.backgroundColor = "#475569"; // greyed out
                btn.style.cursor = "not-allowed";
            }

            card.appendChild(btn);
        });

        container.appendChild(card);
    }
}

loadData();
</script>

</body>
</html>
