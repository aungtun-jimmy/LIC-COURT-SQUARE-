<!DOCTYPE html>
<html>
<head>
  <title>Peterson International LLC - CSQ Portal</title>
  <style>
    body {
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background-color: #2f3e46;
      color: #e0e0e0;
    }
    header {
      background-color: #1b4d5f;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #ffffff;
    }
    .portal {
      padding: 20px;
    }
    .card {
      background-color: #354f52;
      margin: 15px 0;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .card h2 {
      margin: 0;
      font-size: 20px;
      color: #00b4d8;
      text-transform: uppercase;
      cursor: pointer;
    }
    .card-content {
      margin-top: 10px;
    }
    .link-btn {
      display: block;
      background-color: #00b4d8;
      color: white;
      padding: 10px;
      margin: 6px 0;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
    }
    .link-btn:hover {
      background-color: #0096c7;
    }
    footer {
      background-color: #1c2b2d;
      text-align: center;
      padding: 14px;
      font-size: 13px;
      color: #ffffff;
    }
  </style>
</head>
<body>

<header>
  Peterson International LLC
</header>

<div class="portal">
  <div id="cardContainer"></div>
</div>

<footer>
  © Peterson International LLC – All Rights Reserved
</footer>

<script>
async function loadData() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv"; 
  const response = await fetch(url);
  const text = await response.text();

  const rows = text.split("\n").map(r => r.split(","));
  const data = rows.slice(1);

  const categories = {};
  data.forEach(row => {
    if (row.length < 4) return;
    const [category, subCategory, branchLevel, linkNotes] = row.map(cell => cell.trim());
    if (!category) return;
    if (!categories[category]) categories[category] = [];
    categories[category].push({ subCategory, branchLevel, linkNotes });
  });

  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  for (const category in categories) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h2>${category}</h2>`;
    const content = document.createElement("div");
    content.className = "card-content";

    categories[category].forEach(item => {
      let label = "";
      label += item.subCategory && item.subCategory !== "–" ? item.subCategory : "Sub";
      label += item.branchLevel && item.branchLevel !== "–" ? " – " + item.branchLevel : "";

      if (item.linkNotes && item.linkNotes.trim() !== "" && !item.linkNotes.toLowerCase().includes("paste link here")) {
        const btn = document.createElement("a");
        btn.className = "link-btn";
        btn.textContent = label;
        btn.href = item.linkNotes;
        btn.target = "_blank";
        content.appendChild(btn);
      } else {
        const btn = document.createElement("div");
        btn.className = "link-btn";
        btn.textContent = label + " (No link)";
        btn.style.backgroundColor = "#444";
        btn.style.color = "#999";
        content.appendChild(btn);
      }
    });

    card.appendChild(content);
    container.appendChild(card);
  }
}
loadData();
</script>

</body>
</html>
