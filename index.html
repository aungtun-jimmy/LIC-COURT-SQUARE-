<!DOCTYPE html>
<html>
<head>
  <title>Peterson International LLC - CSQ Portal</title>
  <style>
    body {
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background-color: #0d1b2a;   /* midnight blue background */
      color: #e0e0e0;              /* light silver text */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #1b263b;   /* deep navy header */
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #e0e0e0;
      border-bottom: 2px solid #778da9; /* silver accent line */
    }
    .cover {
      height: 220px;
      background: url('cover.png') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .project-title {
      position: relative;
      z-index: 2;
      color: #ffffff;
      text-align: center;
      background: rgba(27,38,59,0.6); /* dark blue overlay for readability */
      padding: 12px 20px;
      border-radius: 6px;
    }
    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 3;
    }
    .logo img {
      height: 60px;
      background: white;
      padding: 5px;
      border-radius: 5px;
    }
    .portal {
      flex: 1;
      padding: 20px;
    }
    .card {
      background-color: #1b263b;   /* dark navy cards */
      margin: 15px 0;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      border: 1px solid #415a77;   /* silver border */
    }
    .card h2 {
      margin: 0;
      font-size: 20px;
      color: #778da9;              /* silver titles */
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
    }
    .card h2::after {
      content: "▶";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.3s;
    }
    .card.open h2::after {
      transform: translateY(-50%) rotate(90deg);
    }
    .card-content {
      display: none;
      margin-top: 10px;
    }
    .card.open .card-content {
      display: block;
    }
    .link-btn {
      display: block;
      background-color: #778da9;   /* silver buttons */
      color: #0d1b2a;
      font-weight: bold;
      padding: 10px;
      margin: 6px 0;
      text-align: center;
      border-radius: 6px;
      text-decoration: none;
    }
    .link-btn:hover {
      background-color: #e0e0e0;
      color: #0d1b2a;
    }
    footer {
      background-color: #1b263b;   /* dark footer */
      text-align: center;
      padding: 14px;
      font-size: 13px;
      color: #778da9;
      margin-top: auto; /* pushes footer to bottom */
      border-top: 2px solid #778da9;
    }
  </style>
</head>
<body>

<header>
  Peterson International LLC
</header>

<div class="cover">
  <div class="logo">
    <img src="logo.jpg" alt="Company Logo" 
         onerror="this.src='https://via.placeholder.com/150x60?text=Logo';">
  </div>
  <div class="project-title">
    <h1>LIC COURT SQUARE</h1>
    <p>45-03 23RD STREET, QUEENS, NY</p>
  </div>
</div>

<div class="portal">
  <div id="cardContainer"></div>
</div>

<footer>
  © Peterson International LLC – All Rights Reserved
</footer>

<script>
async function loadData() {
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv"; 
  const response = await fetch(url);
  const text = await response.text();

  const rows = text.split("\n").map(r => r.split(","));
  const data = rows.slice(1);

  const categories = {};
  data.forEach(row => {
    const category = row[0] ? row[0].trim() : "";
    const subCategory = row[1] ? row[1].trim() : "";
    const branchLevel = row[2] ? row[2].trim() : "";
    const linkNotes = row[3] ? row[3].trim() : "";
    if (!category) return;
    if (!categories[category]) categories[category] = [];
    categories[category].push({ subCategory, branchLevel, linkNotes });
  });

  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  for (const category in categories) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h2>${category}</h2>`;
    const content = document.createElement("div");
    content.className = "card-content";

    categories[category].forEach(item => {
      let label = "";
      label += item.subCategory && item.subCategory !== "–" ? item.subCategory : "Sub";
      label += item.branchLevel && item.branchLevel !== "–" ? " – " + item.branchLevel : "";

      if (item.linkNotes && item.linkNotes.trim() !== "" && !item.linkNotes.toLowerCase().includes("paste link here")) {
        const btn = document.createElement("a");
        btn.className = "link-btn";
        btn.textContent = label;
        btn.href = item.linkNotes;
        btn.target = "_blank";
        content.appendChild(btn);
      } else {
        const btn = document.createElement("div");
        btn.className = "link-btn";
        btn.textContent = label + " (No link)";
        btn.style.backgroundColor = "#333";
        btn.style.color = "#999";
        content.appendChild(btn);
      }
    });

    card.querySelector("h2").onclick = () => {
      card.classList.toggle("open");
    };

    card.appendChild(content);
    container.appendChild(card);
  }
}
loadData();
</script>

</body>
</html>
