            color: white;
            text-decoration: none;
            padding: 8px;
            margin: 8px 0;
            text-align: center;
            border-radius: 6px;
        }

        .link:hover {
            background-color: #1d4ed8;
        }

</head>

<body>

<h1>CSQ - LIC COURT SQUARE PROJECT</h1>

<div class="container">

    <div class="card">
        <h2>SHELL MODEL</h2>

</div>
