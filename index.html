<!DOCTYPE html>
<html>
<head>
    <title>Peterson International LLC - CSQ Portal</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #333;
        }

        /* Company Header */
        header {
            background-color: rgba(255,255,255,0.95);
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .cover {
            height: 250px;
            background: url('cover.png') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
        }
        .project-title {
            position: relative;
            text-align: center;
            z-index: 2;
            color: white;
        }
        .project-title h1 {
            margin: 0;
            font-size: 36px;
            letter-spacing: 2px;
        }
        .project-title p {
            margin-top: 8px;
            font-size: 16px;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 3;
        }
        .logo img {
            height: 60px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }

        .portal {
            padding: 40px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card h2 {
            margin: 0;
            font-size: 20px;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            position: relative;
            color: #1e3c72;
            text-transform: uppercase; /* force titles to CAPITAL */
        }
        .card h2::after {
            content: "▼";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #1e3c72;
            transition: transform 0.3s;
        }
        .card.open h2::after {
            transform: translateY(-50%) rotate(180deg);
        }
        .card-content {
            display: none;
            margin-top: 10px;
        }
        .card.open .card-content {
            display: block;
        }
        .link-btn {
            display: block;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }
        .link-btn:hover {
            background-color: #1d4ed8;
        }
        .no-link {
            color: #f87171;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    Peterson International LLC
</header>

<div class="cover">
    <div class="logo">
        <img src="logo.jpg" alt="Company Logo">
    </div>
    <div class="project-title">
        <h1>LIC COURT SQUARE</h1>
        <p>45-03 23RD STREET, QUEENS, NY</p>
    </div>
</div>

<div id="portalSection" class="portal">
    <div class="container" id="cardContainer"></div>
</div>

<script>
async function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvVKOko1YWaiKsOoMDcmJi3TTVsUN4KgpUyDvpzK1fdBBqV_X4YjLa7vcBXLIiDPVcujqp9cCK7125/pub?output=csv"; 

    const response = await fetch(url);
    const text = await response.text();

    const rows = text.split("\n").map(r => r.split(","));
    const data = rows.slice(1);

    const categories = {};
    data.forEach(row => {
        if (row.length < 4) return;
        const [category, sub, branch, link] = row;
        if (!category) return;
        if (!categories[category]) categories[category] = [];
        categories[category].push({ sub, branch, link });
    });

    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    for (const category in categories) {
        const card = document.createElement("div");
        card.className = "card";
        card.id = category.toLowerCase().replace(/\s+/g, "-");
        card.innerHTML = `<h2>${category}</h2>`;

        const content = document.createElement("div");
        content.className = "card-content";

        categories[category].forEach(item => {
            const btn = document.createElement("div");
            btn.className = "link-btn";
            let label = "";
            if (item.sub && item.sub !== "–") label += item.sub;
            if (item.branch && item.branch !== "–") {
                label += label ? " – " + item.branch : item.branch;
            }
            btn.textContent = label || "Link";

            if (item.link && item.link.trim() !== "" && !item.link.toLowerCase().includes("paste link here")) {
                btn.onclick = () => window.open(item.link, "_blank");
            } else {
                const msg = document.createElement("div");
                msg.className = "no-link";
                msg.textContent = "No link yet";
                content.appendChild(msg);
                btn.style.backgroundColor = "#ccc";
                btn.style.color = "#666";
                btn.style.cursor = "not-allowed";
            }

            content.appendChild(btn);
        });

        card.querySelector("h2").onclick = () => {
            card.classList.toggle("open");
        };

        card.appendChild(content);
        container.appendChild(card);
    }
}
loadData();
</script>

</body>
</html>
